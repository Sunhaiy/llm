<svg width="1600" height="520" viewBox="0 0 1600 520" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="80" y1="40" x2="1520" y2="480" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0F172A"/>
      <stop offset="0.5" stop-color="#0B3B66"/>
      <stop offset="1" stop-color="#0F766E"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#FFFFFF" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0.06"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#38BDF8"/>
      <stop offset="1" stop-color="#34D399"/>
    </linearGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="50"/>
    </filter>
  </defs>

  <rect width="1600" height="520" rx="28" fill="url(#bg)"/>

  <circle cx="1320" cy="120" r="140" fill="#38BDF8" fill-opacity="0.18" filter="url(#blur)"/>
  <circle cx="1180" cy="360" r="170" fill="#34D399" fill-opacity="0.16" filter="url(#blur)"/>
  <circle cx="260" cy="100" r="120" fill="#60A5FA" fill-opacity="0.10" filter="url(#blur)"/>

  <rect x="74" y="74" width="820" height="372" rx="26" fill="url(#card)" stroke="#FFFFFF" stroke-opacity="0.16"/>
  <rect x="954" y="86" width="572" height="348" rx="26" fill="url(#card)" stroke="#FFFFFF" stroke-opacity="0.14"/>

  <text x="120" y="176" fill="#E2E8F0" font-family="Segoe UI, Arial, sans-serif" font-size="28" letter-spacing="4">PYTORCH · TRANSFORMER · CHARACTER LEVEL</text>
  <text x="120" y="258" fill="white" font-family="Segoe UI, Arial, sans-serif" font-size="78" font-weight="700">LLM From Scratch</text>
  <text x="120" y="324" fill="#C8D6E5" font-family="Segoe UI, Arial, sans-serif" font-size="30">
    Build a tiny GPT by hand, understand every layer.
  </text>
  <text x="120" y="380" fill="#A5F3FC" font-family="Consolas, monospace" font-size="24">
    token embedding + self-attention + feed forward + autoregressive generation
  </text>

  <rect x="120" y="404" width="168" height="18" rx="9" fill="#1E293B"/>
  <rect x="120" y="404" width="124" height="18" rx="9" fill="url(#accent)"/>
  <text x="306" y="420" fill="#D1FAE5" font-family="Segoe UI, Arial, sans-serif" font-size="20">training...</text>

  <g opacity="0.95">
    <rect x="996" y="126" width="488" height="64" rx="16" fill="#0F172A" fill-opacity="0.48"/>
    <text x="1030" y="166" fill="#7DD3FC" font-family="Consolas, monospace" font-size="26">with open("input.txt", "r", encoding="utf-8")</text>

    <rect x="996" y="208" width="430" height="64" rx="16" fill="#0F172A" fill-opacity="0.48"/>
    <text x="1030" y="248" fill="#86EFAC" font-family="Consolas, monospace" font-size="26">self.blocks = nn.Sequential(...)</text>

    <rect x="996" y="290" width="454" height="64" rx="16" fill="#0F172A" fill-opacity="0.48"/>
    <text x="1030" y="330" fill="#FDE68A" font-family="Consolas, monospace" font-size="26">loss = F.cross_entropy(logits, targets)</text>

    <rect x="996" y="372" width="344" height="34" rx="17" fill="#111827"/>
    <circle cx="1021" cy="389" r="6" fill="#34D399"/>
    <text x="1040" y="396" fill="#E5E7EB" font-family="Segoe UI, Arial, sans-serif" font-size="18">interactive generation ready</text>
  </g>
</svg>
